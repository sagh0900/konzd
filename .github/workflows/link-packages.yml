name: Link GHCR packages to konzd

# Trigger: manual dispatch.
# Re-run whenever new image versions are published to link them here too.
on:
  workflow_dispatch:

permissions:
  contents: read
  # Note: packages:write is NOT used here — we authenticate with CR_PAT (a personal
  # access token with write:packages scope) because these packages were originally
  # published from sagh0900/zabbix-operator. The CR_PAT has user-level write access
  # to all packages under sagh0900 regardless of which repo they originated from.

jobs:
  link-packages:
    name: Relabel and push ${{ matrix.package }}:${{ matrix.tag }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { package: zabbix-operator,           tag: "latest" }
          - { package: zabbix-operator,           tag: "2.9"    }
          - { package: zabbix-operator,           tag: "2.8"    }
          - { package: zabbix-operator,           tag: "2.7"    }
          - { package: zabbix-operator,           tag: "2.6"    }
          - { package: zabbix-operator,           tag: "2.5"    }
          - { package: zabbix-operator,           tag: "2.4"    }
          - { package: zabbix-operator,           tag: "2.3"    }
          - { package: zabbix-operator,           tag: "2.2"    }
          - { package: zabbix-operator,           tag: "2.1"    }
          - { package: zabbix-operator,           tag: "2.0"    }
          - { package: zabbix-lease-sidecar,      tag: "latest" }
          - { package: zabbix-lease-sidecar,      tag: "2.0"    }
          - { package: zabbix-supervisor,         tag: "latest" }
          - { package: zabbix-supervisor,         tag: "2.0"    }
          - { package: zabbix-migration-sentinel, tag: "latest" }
          - { package: zabbix-migration-sentinel, tag: "2.0"    }

    steps:
      - name: Login to GHCR via CR_PAT
        # Use a PAT (stored as secret CR_PAT) with write:packages scope.
        # These packages originated from sagh0900/zabbix-operator so GITHUB_TOKEN
        # from this repo does not have write access. The PAT has user-level access.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: sagh0900
          password: ${{ secrets.CR_PAT }}

      - name: Pull existing image
        run: |
          docker pull ghcr.io/sagh0900/${{ matrix.package }}:${{ matrix.tag }}

      - name: Rebuild with konzd source label and push
        # Building FROM the existing image + adding the source label creates only a
        # new config blob (no layer re-upload). GitHub links the package to the repo
        # specified in org.opencontainers.image.source when the push completes.
        env:
          IMAGE: ghcr.io/sagh0900/${{ matrix.package }}:${{ matrix.tag }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          # Write a minimal Dockerfile that re-labels the image
          cat > Dockerfile.relabel << 'EOF'
          FROM ${IMAGE}
          LABEL org.opencontainers.image.source="${REPO_URL}"
          LABEL org.opencontainers.image.url="${REPO_URL}"
          LABEL org.opencontainers.image.vendor="konzd"
          LABEL org.opencontainers.image.licenses="Apache-2.0"
          EOF

          # Substitute env vars into the Dockerfile (heredoc with quotes prevents expansion)
          sed -i "s|\${IMAGE}|${IMAGE}|g; s|\${REPO_URL}|${REPO_URL}|g" Dockerfile.relabel

          # Build (only config layer changes; all image layers are cached from the pull above)
          docker build -f Dockerfile.relabel -t "${IMAGE}" .

          # Push — GitHub reads org.opencontainers.image.source from the image config
          # and automatically links this package to sagh0900/konzd
          docker push "${IMAGE}"
          echo "Pushed: ${IMAGE}"
