name: Link GHCR packages to konzd

# Trigger: manual dispatch (run once to link all packages, re-run after new image versions).
on:
  workflow_dispatch:

# GITHUB_TOKEN needs package write permission.
# When this workflow pushes (rewrites manifests) to ghcr.io, GitHub automatically
# connects those packages to THIS repository (konzd).
permissions:
  contents: read
  packages: write

jobs:
  link-packages:
    name: Re-push manifests with konzd source annotation
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # zabbix-operator — all named version tags
          - package: zabbix-operator
            tag: "latest"
          - package: zabbix-operator
            tag: "2.9"
          - package: zabbix-operator
            tag: "2.8"
          - package: zabbix-operator
            tag: "2.7"
          - package: zabbix-operator
            tag: "2.6"
          - package: zabbix-operator
            tag: "2.5"
          - package: zabbix-operator
            tag: "2.4"
          - package: zabbix-operator
            tag: "2.3"
          - package: zabbix-operator
            tag: "2.2"
          - package: zabbix-operator
            tag: "2.1"
          - package: zabbix-operator
            tag: "2.0"
          # zabbix-lease-sidecar
          - package: zabbix-lease-sidecar
            tag: "latest"
          - package: zabbix-lease-sidecar
            tag: "2.0"
          # zabbix-supervisor
          - package: zabbix-supervisor
            tag: "latest"
          - package: zabbix-supervisor
            tag: "2.0"
          # zabbix-migration-sentinel
          - package: zabbix-migration-sentinel
            tag: "latest"
          - package: zabbix-migration-sentinel
            tag: "2.0"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR using GITHUB_TOKEN
        # Using GITHUB_TOKEN (not a PAT) is what causes GitHub to link the package
        # to THIS repository (sagh0900/konzd) when the manifest is re-pushed.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-push manifest with konzd source annotation
        # docker buildx imagetools create rewrites the OCI manifest in-place,
        # adding the source annotation and pushing with GITHUB_TOKEN.
        # No layer download is needed — only manifest metadata is rewritten.
        env:
          IMAGE: ghcr.io/sagh0900/${{ matrix.package }}:${{ matrix.tag }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.source=${REPO_URL}" \
            --annotation "manifest:org.opencontainers.image.source=${REPO_URL}" \
            --annotation "index:org.opencontainers.image.url=${REPO_URL}" \
            --annotation "index:org.opencontainers.image.vendor=konzd" \
            --annotation "index:org.opencontainers.image.licenses=Apache-2.0" \
            -t "${IMAGE}" \
            "${IMAGE}"
          echo "✓ Re-pushed: ${IMAGE}"

      - name: Verify annotation
        env:
          IMAGE: ghcr.io/sagh0900/${{ matrix.package }}:${{ matrix.tag }}
        run: |
          docker buildx imagetools inspect "${IMAGE}" \
            | grep -A2 "org.opencontainers.image.source" || echo "(annotation not shown in inspect output)"
