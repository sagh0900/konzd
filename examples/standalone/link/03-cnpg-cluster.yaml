---
# CloudNativePG Cluster — minimal single-instance for development.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zabbix-pg
  namespace: zabbix-dev
spec:
  instances: 1
  imageName: "ghcr.io/cloudnative-pg/postgresql:16"
  # TLS: CNPG auto-generates certificates when this section is present.
  # Auto-generated secrets: zabbix-pg-ca (CA), zabbix-pg-server (server cert).
  certificates: {}
  bootstrap:
    initdb:
      database: zabbix
      owner: zabbix
      secret:
        name: zabbix-db-creds
  storage:
    size: 10Gi
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
