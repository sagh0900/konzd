---
# Database credentials Secret — same as inline pattern.
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-db-creds
  namespace: zabbix-dev
type: Opaque
stringData:
  username: "zabbix"
  password: "changeme-dev-only"
  database: "zabbix"

---
# ghcr.io pull secret for operator sidecar images.
# Create via: kubectl create secret docker-registry ghcr-pull-secret ...
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: zabbix-dev
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG"

---
# Admin credentials for Zabbix API post-install automation (v2.43+).
# Uncomment adminCredentialsSecretRef in 05-zabbixserver.yaml after rotating Admin password.
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-admin-creds
  namespace: zabbix-dev
  labels:
    app.kubernetes.io/component: zabbix-api-admin
type: Opaque
stringData:
  username: "Admin"
  password: "REPLACE_WITH_CURRENT_ADMIN_PASSWORD"
