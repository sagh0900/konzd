---
# Database credentials Secret.
#
# The ZabbixDatabase CR references this via spec.credentialsRef.
# Keys: username, password (default key names; configurable via credentialsRef.usernameKey/passwordKey).
#
# In production, use a Secret Manager (HashiCorp Vault, AWS Secrets Manager, etc.)
# and inject via the External Secrets Operator instead of plain YAML.
#
# SECURITY: Do NOT commit real passwords to version control.
# Use sealed-secrets, SOPS, or an ESO ClusterSecretStore for GitOps workflows.
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-db-creds
  namespace: zabbix-dev
  labels:
    app.kubernetes.io/name: zabbix-database
    app.kubernetes.io/instance: my-zabbix
type: Opaque
stringData:
  username: "zabbix"
  password: "changeme-dev-only"   # ← replace before use
  database: "zabbix"

---
# GitHub Container Registry pull secret for operator sidecar images.
#
# Needed for: ghcr.io/sagh0900/zabbix-supervisor,
#             ghcr.io/sagh0900/zabbix-lease-sidecar,
#             ghcr.io/sagh0900/zabbix-migration-sentinel
#
# Zabbix workload images (docker.io/zabbix/*) are public and do NOT need this.
#
# Create via CLI (preferred over storing .dockerconfigjson in YAML):
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USER \
#     --docker-password=YOUR_PAT \
#     --namespace=zabbix-dev
#
# Below is the structural template — fill in .dockerconfigjson manually.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: zabbix-dev
type: kubernetes.io/dockerconfigjson
data:
  # base64-encoded JSON: {"auths":{"ghcr.io":{"username":"USER","password":"PAT","auth":"BASE64(USER:PAT)"}}}
  .dockerconfigjson: "REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG"
