---
# ════════════════════════════════════════════════════════════════════════════
# Secrets for Production HA deployment
#
# SECURITY BEST PRACTICES:
#   - Never commit real values to version control.
#   - Use sealed-secrets, SOPS, or External Secrets Operator for GitOps.
#   - Rotate credentials regularly; use short-lived tokens where possible.
#   - Enable Kubernetes secret encryption at rest (EncryptionConfiguration).
# ════════════════════════════════════════════════════════════════════════════

---
# Database credentials.
# Used by ZabbixDatabase.spec.credentialsRef → consumed by ZabbixServer and ZabbixWeb.
# Keys default to "username" and "password"; configure via credentialsRef.usernameKey/passwordKey.
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-db-creds
  namespace: zabbix-suite
  labels:
    app.kubernetes.io/name: zabbix-database
    app.kubernetes.io/component: credentials
  annotations:
    # Annotate secrets for audit trail and automated rotation tooling.
    secret-manager.io/source: "vault:secret/zabbix/db-creds"
    secret-manager.io/rotation: "30d"
type: Opaque
stringData:
  username: "zabbix"
  password: "REPLACE_WITH_STRONG_PASSWORD"   # min 20 chars, mixed alphanumeric + symbols
  database: "zabbix"

---
# PSK (Pre-Shared Key) for Zabbix server ↔ agent/proxy encrypted communication.
# Used in ZabbixServer.spec.tls.pskSecretRef and ZabbixAgent.spec.tls.pskSecretRef.
#
# Generate a strong PSK:
#   openssl rand -hex 32   (64 hex characters = 256-bit key)
#
# The "identity" field must match across server, proxy, and agent CRs.
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-server-psk
  namespace: zabbix-suite
  labels:
    app.kubernetes.io/name: zabbix-server
    app.kubernetes.io/component: psk-secret
type: Opaque
stringData:
  psk: "REPLACE_WITH_64_HEX_CHARS_openssl_rand_-hex_32"

---
# Database CA certificate for TLS verify-full mode.
# Used in ZabbixDatabase.spec.dbTLS.caSecretRef.
#
# Extract from CNPG cluster (CNPG auto-generates a CA):
#   kubectl get secret zabbix-pg-ca -n zabbix-suite -o jsonpath='{.data.ca\.crt}' | base64 -d > ca.crt
#   kubectl create secret generic cnpg-ca-cert --from-file=ca.crt -n zabbix-suite
#
# For external PostgreSQL: provide your own CA certificate.
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-ca-cert
  namespace: zabbix-suite
  labels:
    app.kubernetes.io/component: db-tls-ca
type: Opaque
data:
  # base64-encoded CA certificate PEM
  ca.crt: "REPLACE_WITH_BASE64_ENCODED_CA_CRT"

---
# Client certificate + key for mTLS from Zabbix server/web → PostgreSQL.
# Used in ZabbixDatabase.spec.dbTLS.clientCertSecretRef.
#
# Generate client cert signed by CNPG CA:
#   kubectl cnpg certificate zabbix-client --cnpg-cluster zabbix-pg --cnpg-user zabbix -n zabbix-suite
# or use cert-manager to issue a certificate from the CNPG CA Issuer.
#
# Secret must contain keys: tls.crt, tls.key
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-db-client-cert
  namespace: zabbix-suite
  labels:
    app.kubernetes.io/component: db-tls-client
type: kubernetes.io/tls
data:
  tls.crt: "REPLACE_WITH_BASE64_CLIENT_CRT"
  tls.key: "REPLACE_WITH_BASE64_CLIENT_KEY"

---
# HTTPS TLS certificate for the Zabbix web ingress.
# Used in ZabbixWeb.spec.ingress.tls[].secretName.
#
# Options:
#   A) cert-manager (recommended): annotate the ingress with cert-manager.io/cluster-issuer
#      and let cert-manager create this Secret automatically.
#   B) Manual: upload your certificate from your PKI.
#   C) Let's Encrypt via Traefik: configure Traefik ACME resolver (see 08-traefik-middleware.yaml).
#
# For cert-manager automatic management, delete this Secret and add annotation:
#   cert-manager.io/cluster-issuer: letsencrypt-prod
# to the ZabbixWeb ingress annotations.
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-web-tls
  namespace: zabbix-suite
  labels:
    app.kubernetes.io/component: web-tls
type: kubernetes.io/tls
data:
  tls.crt: "REPLACE_WITH_BASE64_CERT_CRT"
  tls.key: "REPLACE_WITH_BASE64_CERT_KEY"

---
# GitHub Container Registry pull secret for operator sidecar images.
# The operator SA and zabbix-server SA both need this to pull from ghcr.io/sagh0900.
#
# Create via CLI (do NOT store the raw .dockerconfigjson in source control):
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USER \
#     --docker-password=YOUR_PAT \
#     --namespace=zabbix-suite
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: zabbix-suite
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "REPLACE_WITH_BASE64_DOCKER_CONFIG"

---
# SMTP credentials for Zabbix alert notifications (injected via extraEnv secretKeyRef).
# Referenced in ZabbixServer.spec.extraEnv using secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-smtp-creds
  namespace: zabbix-suite
  labels:
    app.kubernetes.io/component: smtp
type: Opaque
stringData:
  smtp-password: "REPLACE_WITH_SMTP_PASSWORD"
  smtp-username: "zabbix-alerts@example.com"
