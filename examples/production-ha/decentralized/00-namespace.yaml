---
# Production namespace with resource quotas and default limits.
apiVersion: v1
kind: Namespace
metadata:
  name: zabbix-suite
  labels:
    app.kubernetes.io/managed-by: zabbix-operator
    environment: production
    team: platform

---
# ResourceQuota: guard against runaway pod/resource creation.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: zabbix-suite-quota
  namespace: zabbix-suite
spec:
  hard:
    pods: "50"
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    persistentvolumeclaims: "20"

---
# LimitRange: default resource limits for pods that omit resource requests.
apiVersion: v1
kind: LimitRange
metadata:
  name: zabbix-suite-limits
  namespace: zabbix-suite
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
