---
# ZabbixSuite — Production HA / Inline Mode
#
# Full high-availability configuration with:
#   - 3-node CNPG PostgreSQL + PgBouncer
#   - DB TLS (verify-ca using CNPG auto-generated cluster CA)
#   - PSK encryption for server↔agent/proxy communications
#   - ExtraEnv tuning from ConfigMap (pollers, cache sizes, SMTP)
#   - LoadBalancer Service for Zabbix agent/proxy traffic (port 10051)
#   - HTTPS ingress for web UI (with TLS termination at ingress controller)
#   - Upgrade policy with manual approval and pre-upgrade CNPG backup required
#
# INLINE MODE SYNTAX: component specs are nested under .spec
#   server:
#     spec:          ← required; NOT server.image or server.replicas directly
#       image: ...
#       replicas: 2
#
# APPLY PREREQUISITES (in order):
#   00-namespace.yaml, 01-secrets.yaml, 02-configmaps.yaml, 03-rbac.yaml
#   04-cnpg-cluster.yaml (wait: cluster Ready)
#   05-cnpg-pooler.yaml
#   Then this file.
apiVersion: zabbix.io/v1alpha1
kind: ZabbixSuite
metadata:
  name: my-zabbix
  namespace: zabbix-suite
  labels:
    app.kubernetes.io/name: zabbix-suite
    app.kubernetes.io/instance: my-zabbix
    environment: production
  annotations:
    zabbix-operator.io/managed-by-version: "2.46"

spec:
  version: "7.4.0"

  storageReclaimPolicy: Retain

  # ── CNPG database backend ──────────────────────────────────────────────────
  # ZabbixDatabase is ALWAYS suite-managed (no link mode for database).
  # The suite creates "my-zabbix-db" from these CNPG refs.
  #
  # cnpg only references CNPG topology; DB credentials, TLS, and schema options
  # are configured on the ZabbixDatabase CR (created automatically by the suite).
  #
  # directServiceName: CNPG primary-direct service used during schema upgrades to
  # bypass PgBouncer (DDL requires non-transactional connections). Always "<cluster>-rw".
  cnpg:
    clusterRef:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: zabbix-pg
      namespace: zabbix-suite
    poolerRef:
      apiVersion: postgresql.cnpg.io/v1
      kind: Pooler
      name: zabbix-pg-pooler-rw
      namespace: zabbix-suite
    directServiceName: zabbix-pg-rw
    # Max staleness of CNPG status observation; 1h is safe for stable production clusters.
    trustWindow: "1h"

  # ── Server (HA, inline) ───────────────────────────────────────────────────
  # Inline mode: all spec fields go under server.spec.
  # The operator creates a ZabbixServer CR named "my-zabbix-server".
  server:
    spec:
      image: "zabbix/zabbix-server-pgsql:ubuntu-7.4-latest"

      # 2 replicas: leader + hot standby.
      # Only the leader binds port 10051; EndpointSlice routes to leader IP only.
      # v2.46: staged HA startup — PostUpgrade starts 1 pod first to confirm DB
      # connectivity, then scales to spec.replicas. Cascading CrashLoopBackOff on
      # a bad image/schema is caught early with minimal blast radius.
      replicas: 2

      version: "7.4.0"

      # Lease timing — production defaults (all tested in failover scenarios):
      #   Graceful failover: ~1s   (lease released immediately on SIGTERM)
      #   Force-kill failover: ~2s  (standby acquires immediately after pod delete)
      #   Node crash failover: ~20s (must wait for leaseDuration TTL to expire)
      leaseDuration: "20s"
      renewDeadline: "15s"
      retryPeriod: "3s"
      deltaNet: "2s"
      deltaDisk: "1s"

      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "2Gi"

      upgradeResources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      # PSK encryption for server↔agent and server↔proxy communications.
      tls:
        mode: "psk"
        pskIdentity: "zabbix-server-psk"
        pskSecretRef:
          name: zabbix-server-psk
          key: psk

      # LoadBalancer: exposes port 10051 externally so agents on other networks connect.
      service:
        type: LoadBalancer
        labels:
          monitoring.example.com/role: "zabbix-active"

      operatorImages:
        supervisorImage:        "ghcr.io/sagh0900/zabbix-supervisor:2.0"
        leaseSidecarImage:      "ghcr.io/sagh0900/zabbix-lease-sidecar:2.1"
        migrationSentinelImage: "ghcr.io/sagh0900/zabbix-migration-sentinel:2.3"

      # ExtraEnv: tuning parameters from ConfigMap (02-configmaps.yaml).
      # IMPORTANT: Protected keys (ZBX_DB_*, ZBX_HANODENAME, ZBX_NODEADDRESS,
      # ZBX_DB_TLS_*) are always operator-owned and cannot be overridden here.
      extraEnv:
        - name: ZBX_STARTPOLLERS
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_pollers
        - name: ZBX_STARTPOLLERSUNREACHABLE
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_pollers_unreachable
        - name: ZBX_STARTHTTPPOLLERS
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_http_pollers
        - name: ZBX_STARTDISCOVERERS
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_discoverers
        - name: ZBX_STARTESCALATORS
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_escalators
        - name: ZBX_STARTPREPROCESSORS
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_preprocessors
        - name: ZBX_STARTTRAPPERS
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_trappers
        - name: ZBX_STARTALERTERS
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: start_alerters
        - name: ZBX_CACHESIZE
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: cache_size
        - name: ZBX_HISTORYCACHESIZE
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: history_cache_size
        - name: ZBX_VALUECACHESIZE
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: value_cache_size
        - name: ZBX_LOGSLOWQUERIES
          valueFrom:
            configMapKeyRef:
              name: zabbix-server-tuning
              key: log_slow_queries
        # Sensitive: always use secretKeyRef for passwords
        - name: ZBX_SMTPPASSWORD
          valueFrom:
            secretKeyRef:
              name: zabbix-smtp-creds
              key: smtp-password

      upgradePolicy:
        allowMajorUpgrade: false
        requireManualApproval: true     # require human sign-off before upgrade
        manualApprovalGranted: false    # flip to true after pre-flight review
        cnpgBackupRequired: true        # require successful CNPG backup before DDL
        sentinelDryRun: false

      # ── Post-install automation ────────────────────────────────────────────
      # Deletes the built-in "Zabbix server" monitoring host after first startup.
      # In containers the local agent is disabled → host permanently shows
      # "agent not reachable" in the web UI.
      #
      # v2.46: job waits for ZabbixWeb AvailableReplicas >= 1 before being
      # created (PHP-FPM must be ready to serve the API call).
      #
      # v2.43+: server pods are re-annotated with SHA256(DB CA cert) on each
      # reconcile — any CNPG CA rotation triggers a rolling restart automatically.
      disableDefaultAgentHost: true
      adminCredentialsSecretRef:
        name: zabbix-admin-creds   # Secret keys: username, password

  # ── Web (HA, inline) ──────────────────────────────────────────────────────
  web:
    spec:
      image: "zabbix/zabbix-web-nginx-pgsql:ubuntu-7.4-latest"
      replicas: 2

      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "1Gi"

      ingress:
        enabled: true
        className: "traefik"
        host: "zabbix.example.com"
        tls:
          - secretName: zabbix-web-tls
            hosts:
              - "zabbix.example.com"
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.tls: "true"
          # cert-manager (uncomment to automate TLS):
          # cert-manager.io/cluster-issuer: letsencrypt-prod

      service:
        type: ClusterIP

  # ── JMX Gateway (inline) ──────────────────────────────────────────────────
  jmx:
    spec:
      image: "zabbix/zabbix-java-gateway:ubuntu-7.4-latest"
      replicas: 2
      port: 10052
      javaOptions: "-Xmx512m -Xms256m"
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      service:
        type: ClusterIP

  # ── SNMP Trapper (inline) ─────────────────────────────────────────────────
  snmpTrapper:
    spec:
      image: "zabbix/zabbix-snmptrapper:ubuntu-7.4-latest"
      mode: DaemonSet
      port: 162
      snmpTrapperFile: "/tmp/zabbix_traps.tmp"
      hostNetwork: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"

  upgradePolicy:
    allowMajorUpgrade: false
    requireManualApproval: true
    manualApprovalGranted: false
    cnpgBackupRequired: true

  operatorImages:
    supervisorImage:        "ghcr.io/sagh0900/zabbix-supervisor:2.0"
    leaseSidecarImage:      "ghcr.io/sagh0900/zabbix-lease-sidecar:2.1"
    migrationSentinelImage: "ghcr.io/sagh0900/zabbix-migration-sentinel:2.3"
